<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCDevConsole</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111111;
      --panel: #1a1a1a;
      --panel-2: #202020;
      --panel-3: #181818;
      --text: #f3f3f3;
      --muted: #a3a3a3;
      --border: #2d2d2d;
      --accent: #ffffff;
      --success: #38c172;
      --warning: #f59e0b;
      --danger: #ef4444;
      --offline: #737373;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.28);
      --divider-hover: #4a9eff;
    }

    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #f5f5f5;
      --panel: #ffffff;
      --panel-2: #fafafa;
      --panel-3: #f1f1f1;
      --text: #111111;
      --muted: #666666;
      --border: #dddddd;
      --accent: #111111;
      --success: #1f9d55;
      --warning: #b7791f;
      --danger: #dc2626;
      --offline: #999999;
      --shadow: 0 12px 36px rgba(0, 0, 0, 0.08);
      --divider-hover: #0078d4;
    }

    * {
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    textarea,
    input[type="text"],
    input[type="search"],
    .log-line {
      -webkit-user-select: text;
      user-select: text;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 6px;
      padding: 7px 12px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }

    button:hover {
      background: var(--panel-3);
      border-color: var(--muted);
    }

    button:active {
      transform: translateY(1px);
    }

    textarea {
      width: 100%;
      resize: none;
      background: var(--panel-3);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      min-height: 120px;
      outline: none;
    }

    .app {
      display: grid;
      grid-template-rows: 40px 1fr 28px;
      width: 100%;
      height: 100%;
    }

    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      -webkit-app-region: drag;
      user-select: none;
    }

    .titlebar__title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.3px;
      flex: 1;
    }

    .titlebar__icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      border: 1.5px solid var(--accent);
      border-radius: 3px;
      flex-shrink: 0;
    }

    .titlebar__actions {
      display: flex;
      gap: 8px;
      align-items: center;
      -webkit-app-region: no-drag;
    }

    .titlebar__button {
      width: 30px;
      height: 30px;
      border: none;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: background 0.12s ease;
      border-radius: 3px;
      flex: 0 0 auto;
    }

    .titlebar__button svg {
      width: 15px;
      height: 15px;
      display: block;
      flex: 0 0 auto;
    }

    .titlebar__button:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .titlebar__button:active {
      background: rgba(255, 255, 255, 0.12);
    }

    :root[data-theme="light"] .titlebar__button:hover {
      background: rgba(0, 0, 0, 0.06);
    }

    :root[data-theme="light"] .titlebar__button:active {
      background: rgba(0, 0, 0, 0.1);
    }

    .titlebar__button.close:hover,
    :root[data-theme="light"] .titlebar__button.close:hover {
      background: #ef4444;
      color: white;
    }

    .titlebar__button.close:active,
    :root[data-theme="light"] .titlebar__button.close:active {
      background: #dc2626;
      color: white;
    }

    .layout {
      display: flex;
      min-height: 0;
    }

    .sidebar {
      flex: 0 0 280px;
      border-right: 1px solid var(--border);
      background: var(--panel);
      padding: 12px;
      overflow: auto;
      min-width: 150px;
      max-width: 600px;
    }

    .sidebar-divider {
      position: relative;
      width: 1px;
      background: var(--border);
      cursor: ew-resize;
      flex: 0 0 auto;
      z-index: 10;
      transition: background 0.2s ease;
    }

    .sidebar-divider:hover,
    .sidebar-divider.dragging {
      background: var(--divider-hover);
    }

    .content {
      display: flex;
      flex: 1 1 auto;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      background: var(--bg);
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 12px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.8px;
    }

    .device-list,
    .logs {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .device {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      box-shadow: none;
      text-align: left;
    }

    .device.active {
      border-color: color-mix(in srgb, var(--divider-hover) 50%, var(--border));
      box-shadow: inset 2px 0 0 var(--divider-hover);
    }

    .device__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .device__name {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-size: 14px;
      font-weight: 600;
    }

    .device__name span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .device__meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      font-family: Consolas, "Courier New", monospace;
    }

    .device__hint {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .device__label {
      color: var(--muted);
      min-width: 34px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-size: 11px;
    }

    .device__value {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }

    .device__platform {
      color: var(--text);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      flex: 0 0 auto;
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--success) 16%, transparent);
    }

    .dot.offline {
      background: var(--offline);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--offline) 18%, transparent);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      border: 1px solid var(--border);
      color: var(--text);
      background: var(--panel-3);
    }

    .badge.online {
      border-color: color-mix(in srgb, var(--success) 30%, var(--border));
    }

    .badge.offline {
      border-color: color-mix(in srgb, var(--offline) 40%, var(--border));
    }

    .panel {
      margin: 12px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow);
    }

    .panel.logs-panel {
      flex: 1;
      min-height: 200px;
    }

    .panel.composer-panel {
      flex: 0 0 auto;
      min-height: 44px;
      padding-top: 10px;
      padding-bottom: 10px;
      overflow: hidden;
      transition: min-height 0.18s ease, padding 0.18s ease;
    }

    .panel.composer-panel.expanded {
      min-height: clamp(164px, 34vh, 280px);
      padding-top: 12px;
      padding-bottom: 12px;
    }

    .panel__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .panel__meta {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.3;
    }

    .logs {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 11px;
      line-height: 1.3;
      white-space: pre-wrap;
    }

    .log-line {
      padding: 5px 8px;
      border-radius: 3px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      line-height: 1.3;
      word-break: break-word;
    }

    .log-line[data-level="STDERR"],
    .log-line[data-level="ERROR"] {
      border-color: rgba(239, 68, 68, 0.45);
      background: color-mix(in srgb, rgba(239, 68, 68, 0.12) 55%, var(--panel-2));
    }

    .log-line[data-level="WARN"] {
      border-color: rgba(245, 158, 11, 0.42);
      background: color-mix(in srgb, rgba(245, 158, 11, 0.12) 55%, var(--panel-2));
    }

    .log-line[data-level="DEBUG"] {
      border-color: rgba(6, 182, 212, 0.4);
      background: color-mix(in srgb, rgba(6, 182, 212, 0.1) 55%, var(--panel-2));
    }

    .log-line[data-level="SUCCESS"] {
      border-color: rgba(34, 197, 94, 0.4);
      background: color-mix(in srgb, rgba(34, 197, 94, 0.1) 55%, var(--panel-2));
    }

    .log-line[data-level="DEVELOPER"] {
      border-color: rgba(107, 114, 128, 0.38);
      color: color-mix(in srgb, var(--muted) 82%, var(--text));
      background: color-mix(in srgb, rgba(107, 114, 128, 0.08) 55%, var(--panel-2));
    }

    .log-line[data-level="INFO"] {
      border-color: rgba(255, 255, 255, 0.12);
    }

    .composer {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
      height: 100%;
    }

    .composer-panel:not(.expanded) .composer {
      gap: 0;
    }

    .composer__toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      min-height: 24px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }

    .composer__title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-weight: 600;
      line-height: 1;
      min-height: 18px;
    }

    .composer__chevron {
      width: 8px;
      height: 8px;
      display: inline-block;
      flex: 0 0 auto;
      margin-top: -1px;
      border-right: 1.5px solid var(--muted);
      border-bottom: 1.5px solid var(--muted);
      transform: rotate(45deg);
      transform-origin: center;
      transition: transform 0.15s ease;
    }

    .composer-panel.expanded .composer__chevron {
      transform: rotate(-135deg);
    }

    .composer__body {
      display: none;
      min-height: 0;
      padding-top: 2px;
    }

    .composer-panel.expanded .composer__body {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
      min-height: 0;
      overflow: hidden;
      flex: 1 1 auto;
    }

    .composer__controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: nowrap;
      min-width: 0;
    }

    .composer__target-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .composer__target {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--border);
      background: var(--panel-3);
      border-radius: 8px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .composer__target-button {
      min-width: 0;
      padding: 7px 10px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      flex: 1 1 0;
      white-space: nowrap;
    }

    .composer__target-button.active {
      background: var(--panel);
      color: var(--text);
      box-shadow: inset 0 0 0 1px var(--border);
    }

    .composer__run-button {
      width: 36px;
      height: 36px;
      min-width: 36px;
      padding: 0;
      border: 1px solid #0078d4;
      border-radius: 8px;
      background: #0078d4;
      color: #ffffff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .composer__run-button:hover {
      background: #1984d8;
      border-color: #1984d8;
    }

    .composer__run-button:active {
      background: #006cbd;
      border-color: #006cbd;
    }

    .composer__hint {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .code-editor {
      position: relative;
      min-height: 72px;
      height: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-3);
      overflow: hidden;
    }

    .code-editor__highlight,
    .code-editor__input {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 0;
      padding: 12px 14px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.6;
      white-space: pre;
      overflow: auto;
      tab-size: 4;
    }

    .code-editor__highlight {
      position: absolute;
      inset: 0;
      color: var(--text);
      pointer-events: none;
      overflow: hidden;
    }

    .code-editor__input {
      position: relative;
      z-index: 1;
      resize: none;
      border: none;
      outline: none;
      background: transparent;
      color: transparent;
      caret-color: var(--text);
      border-radius: 0;
      overflow: auto;
    }

    .code-token-keyword { color: #c586c0; }
    .code-token-string { color: #ce9178; }
    .code-token-number { color: #b5cea8; }
    .code-token-comment { color: #6a9955; }
    .code-token-builtin { color: #4fc1ff; }

    :root[data-theme="light"] .code-token-keyword { color: #7c3aed; }
    :root[data-theme="light"] .code-token-string { color: #b45309; }
    :root[data-theme="light"] .code-token-number { color: #047857; }
    :root[data-theme="light"] .code-token-comment { color: #6b7280; }
    :root[data-theme="light"] .code-token-builtin { color: #0369a1; }

    @media (max-width: 520px) {
      .composer__controls {
        gap: 8px;
      }

      .composer__target-button {
        padding: 7px 8px;
        font-size: 11px;
      }

      .composer__run-button {
        width: 34px;
        height: 34px;
        min-width: 34px;
      }
    }

    .divider {
      position: relative;
      height: 1px;
      background: var(--border);
      cursor: ns-resize;
      flex: 0 0 auto;
      z-index: 10;
      transition: background 0.2s ease;
    }

    .divider:hover,
    .divider.dragging {
      background: var(--divider-hover);
    }

    .statusbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 12px;
      border-top: 1px solid var(--border);
      background: #0078d4;
      color: #ffffff;
      font-size: 12px;
    }

    :root[data-theme="light"] .statusbar {
      background: #0078d4;
      color: #ffffff;
    }

    .empty {
      color: var(--muted);
      padding: 14px 10px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      text-align: center;
    }

    .muted {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="titlebar" id="titlebar">
      <div class="titlebar__title">
        <div class="titlebar__icon">C</div>
        <span>MCDevConsole</span>
      </div>
      <div class="titlebar__actions">
        <button id="github-link" class="titlebar__button" title="GitHub">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8 1.2a6.8 6.8 0 0 0-2.15 13.25c.34.06.46-.14.46-.33v-1.18c-1.88.41-2.27-.8-2.27-.8-.3-.75-.76-.94-.76-.94-.62-.42.04-.41.04-.41.69.05 1.06.69 1.06.69.6 1.05 1.58.74 1.96.57.06-.45.24-.74.43-.91-1.5-.17-3.07-.75-3.07-3.34 0-.74.27-1.35.69-1.82-.07-.17-.3-.86.07-1.79 0 0 .56-.18 1.84.69A6.3 6.3 0 0 1 8 4.98c.58 0 1.17.08 1.72.24 1.28-.87 1.84-.69 1.84-.69.37.93.14 1.62.07 1.79.43.47.69 1.08.69 1.82 0 2.59-1.57 3.16-3.08 3.33.25.21.47.62.47 1.26v1.39c0 .19.12.39.47.33A6.8 6.8 0 0 0 8 1.2Z"/>
          </svg>
        </button>
        <button id="theme-toggle" class="titlebar__button" title="切换主题">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <circle cx="8" cy="8" r="3" fill="currentColor"/>
            <path d="M8 1v2M8 13v2M15 8h-2M3 8h-2M12.7 3.3l-1.4 1.4M4.7 12.3l-1.4 1.4M12.7 12.7l-1.4-1.4M4.7 3.7l-1.4-1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <div style="flex: 1;"></div>
        <button id="titlebar-minimize" class="titlebar__button" title="最小化">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <rect y="7" width="16" height="2" rx="1"/>
          </svg>
        </button>
        <button id="titlebar-maximize" class="titlebar__button" title="最大化">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <rect x="2" y="2" width="12" height="12" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </button>
        <button id="titlebar-close" class="titlebar__button close" title="关闭">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M2.5 2.5L13.5 13.5M13.5 2.5L2.5 13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar" id="sidebar">
        <h2 class="section-title">客户端列表</h2>
        <div class="device-list" id="device-list"></div>
      </aside>

      <div class="sidebar-divider" id="sidebar-divider"></div>

      <section class="content">
        <div class="panel logs-panel" id="logs-panel">
          <div class="panel__header">
            <div>
              <h2 class="section-title">日志</h2>
              <div class="panel__meta" id="active-device-text">当前会话：未选择客户端</div>
            </div>
            <div class="panel__meta" id="stats">日志缓存：0 / 2000</div>
          </div>
          <div class="logs" id="logs"></div>
        </div>

        <div class="divider" id="divider"></div>

        <div class="panel composer-panel" id="composer-panel">
          <div class="composer">
            <div class="composer__toolbar" id="composer-toggle">
              <div class="composer__title">
                <span class="composer__chevron"></span>
                <span>Python</span>
              </div>
              <span id="bridge-status">已折叠</span>
            </div>
            <div class="composer__body">
              <div class="composer__controls">
                <div class="composer__target-wrap">
                  <div class="composer__target" id="command-target">
                    <button type="button" class="composer__target-button active" data-target="client">客户端</button>
                    <button type="button" class="composer__target-button" data-target="server">服务端</button>
                  </div>
                  <button id="send-command" class="composer__run-button" title="执行" aria-label="执行">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                      <path d="M4 3.5v9l8-4.5-8-4.5Z"/>
                    </svg>
                  </button>
                </div>
              </div>
              <div class="code-editor">
                <pre class="code-editor__highlight" id="command-highlight"></pre>
                <textarea id="command-input" class="code-editor__input" spellcheck="false">print("hello from python")</textarea>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="statusbar">
      <div>UDP 自动发现端口：18232</div>
      <div id="runtime-hint">等待宿主连接</div>
    </footer>
  </div>

  <script>
    const themeKey = 'mcdevconsole.theme';
    const maxLogs = 2000;
    const cleanupCount = 500;
    const maxVisibleLogs = 500;
    const logs = [];
    const deviceMap = new Map();
    let activeDeviceId = null;
    let renderScheduled = false;
    let deviceRenderScheduled = false;

    const bridge = {
      available: Boolean(window.chrome && window.chrome.webview),
      post(message) {
        if (this.available) {
          window.chrome.webview.postMessage(message);
          return true;
        }

        console.info('[MCDevConsole] 浏览器模式下拦截宿主消息', message);
        return false;
      }
    };

    // 可拖拽分隔条逻辑
    const divider = document.getElementById('divider');
    const logsPanel = document.getElementById('logs-panel');
    const composerPanel = document.getElementById('composer-panel');
    let isDragging = false;
    let startY = 0;
    let startLogsHeight = 0;
    let startComposerHeight = 0;

    divider.addEventListener('mousedown', (e) => {
      // 只有展开状态才允许拖拽
      if (!composerPanel.classList.contains('expanded')) {
        return;
      }
      isDragging = true;
      startY = e.clientY;
      startLogsHeight = logsPanel.offsetHeight;
      startComposerHeight = composerPanel.offsetHeight;
      divider.classList.add('dragging');
      document.body.style.cursor = 'ns-resize';
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;

      const deltaY = e.clientY - startY;
      const newLogsHeight = startLogsHeight + deltaY;
      const newComposerHeight = startComposerHeight - deltaY;
      const composerMinHeight = 164; // 展开状态的最小高度

      if (newLogsHeight >= 120 && newComposerHeight >= composerMinHeight) {
        logsPanel.style.flex = `0 0 ${newLogsHeight}px`;
        composerPanel.style.flex = `0 0 ${newComposerHeight}px`;
      }
    });

    document.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        divider.classList.remove('dragging');
        document.body.style.cursor = '';
      }
    });

    // 侧边栏拖拽逻辑
    const sidebarDivider = document.getElementById('sidebar-divider');
    const sidebar = document.getElementById('sidebar');
    let isSidebarDragging = false;
    let sidebarStartX = 0;
    let sidebarStartWidth = 0;

    sidebarDivider.addEventListener('mousedown', (e) => {
      isSidebarDragging = true;
      sidebarStartX = e.clientX;
      sidebarStartWidth = sidebar.offsetWidth;
      sidebarDivider.classList.add('dragging');
      document.body.style.cursor = 'ew-resize';
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isSidebarDragging) return;

      const deltaX = e.clientX - sidebarStartX;
      const newWidth = sidebarStartWidth + deltaX;

      if (newWidth >= 150 && newWidth <= 600) {
        sidebar.style.flex = `0 0 ${newWidth}px`;
      }
    });

    document.addEventListener('mouseup', () => {
      if (isSidebarDragging) {
        isSidebarDragging = false;
        sidebarDivider.classList.remove('dragging');
        document.body.style.cursor = '';
      }
    });

    function syncWindowTheme(theme) {
      bridge.post({
        kind: 'window.theme',
        theme,
        timestamp: Date.now()
      });
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem(themeKey, theme);
      syncWindowTheme(theme);
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'dark';
      applyTheme(current === 'dark' ? 'light' : 'dark');
      addLog('INFO', `主题已切换为 ${current === 'dark' ? 'light' : 'dark'}`);
    }

    function ensureDevice(device) {
      const existing = deviceMap.get(device.id) || {};
      const merged = {
        logs: existing.logs || [],
        lastSeen: existing.lastSeen || '',
        ...existing,
        ...device
      };
      deviceMap.set(merged.id, merged);
      if (!activeDeviceId) {
        activeDeviceId = merged.id;
      }
      return merged;
    }

    function setActiveDevice(deviceId) {
      if (!deviceMap.has(deviceId)) {
        return;
      }
      activeDeviceId = deviceId;
      renderDevices();
      renderLogs();
    }

    function renderDevices() {
      const container = document.getElementById('device-list');
      const devices = Array.from(deviceMap.values());

      if (devices.length === 0) {
        container.innerHTML = '<div class="empty">暂无客户端</div>';
        return;
      }

      container.innerHTML = devices.map((device) => `
        <button class="device ${device.id === activeDeviceId ? 'active' : ''}" data-device-id="${escapeHtml(device.id)}">
          <div class="device__header">
            <div class="device__name">
              <span class="dot ${device.online ? '' : 'offline'}"></span>
              <span>${escapeHtml(device.name || device.id)}</span>
            </div>
            <span class="badge ${device.online ? 'online' : 'offline'}">${device.online ? '在线' : '离线'}</span>
          </div>
          <div class="device__meta">
            <span class="device__label">ENDP</span>
            <span class="device__value">${escapeHtml(device.endpoint || '未知端点')}</span>
          </div>
          <div class="device__hint">
            <span class="device__platform">${escapeHtml(device.platform || 'Unknown')}</span>
            <span>${escapeHtml(device.lastSeen || '等待发现')}</span>
          </div>
        </button>
      `).join('');

    }

    function scheduleDeviceRender() {
      if (deviceRenderScheduled) {
        return;
      }
      deviceRenderScheduled = true;
      requestAnimationFrame(() => {
        deviceRenderScheduled = false;
        renderDevices();
      });
    }

    function scheduleLogRender() {
      if (renderScheduled) {
        return;
      }
      renderScheduled = true;
      requestAnimationFrame(() => {
        renderScheduled = false;
        renderLogs();
      });
    }

    function getActiveDevice() {
      return activeDeviceId ? deviceMap.get(activeDeviceId) || null : null;
    }

    function isScrolledToBottom(container, threshold = 50) {
      return container.scrollHeight - container.scrollTop - container.clientHeight < threshold;
    }

    function renderLogs() {
      const container = document.getElementById('logs');
      const device = getActiveDevice();
      const deviceLogs = device?.logs || [];

      document.getElementById('active-device-text').textContent = device
        ? `当前会话：${device.name || device.id} (${device.endpoint || '未知端点'})`
        : '当前会话：未选择客户端';

      document.getElementById('stats').textContent = `日志缓存：${deviceLogs.length} / ${maxLogs}`;

      if (!device) {
        container.innerHTML = '<div class="empty">请选择左侧客户端会话</div>';
        return;
      }

      if (deviceLogs.length === 0) {
        container.innerHTML = '<div class="empty">当前会话暂无日志</div>';
        return;
      }

      const wasAtBottom = isScrolledToBottom(container);
      const startIndex = Math.max(0, deviceLogs.length - maxVisibleLogs);
      const visibleLogs = deviceLogs.slice(startIndex);

      container.innerHTML = visibleLogs.map((log) => `
        <div class="log-line" data-level="${escapeHtml(log.level)}">[${escapeHtml(log.time)}] [${escapeHtml(log.level)}] ${escapeHtml(log.message)}</div>
      `).join('');

      if (wasAtBottom) {
        container.scrollTop = container.scrollHeight;
      }
    }

    function trimLogsIfNeeded(device) {
      if (!device || device.logs.length <= maxLogs) {
        return;
      }

      device.logs.splice(0, cleanupCount);
    }

    function addLog(level, message, deviceId = activeDeviceId, time = '') {
      if (!deviceId || !deviceMap.has(deviceId)) {
        console.info('[MCDevConsole][orphan-log]', { level, message, deviceId, time });
        const activeLogs = getActiveDevice()?.logs?.length || 0;
        document.getElementById('stats').textContent = `日志缓存：${activeLogs} / ${maxLogs}`;
        return;
      }

      const entry = {
        time: time || new Date().toLocaleTimeString(),
        level,
        message: typeof message === 'string' ? message : JSON.stringify(message)
      };

      const existingDevice = deviceMap.get(deviceId);
      const device = ensureDevice({
        id: deviceId,
        name: existingDevice?.name || deviceId,
        online: existingDevice?.online ?? true,
        endpoint: existingDevice?.endpoint || '未知端点',
        platform: existingDevice?.platform || 'Unknown',
        lastSeen: time || new Date().toLocaleTimeString()
      });

      device.lastSeen = time || new Date().toLocaleTimeString();
      logs.push(entry);
      device.logs.push(entry);
      trimLogsIfNeeded(device);
      scheduleDeviceRender();

      if (deviceId === activeDeviceId) {
        scheduleLogRender();
      } else {
        const activeLogs = getActiveDevice()?.logs?.length || 0;
        document.getElementById('stats').textContent = `日志缓存：${activeLogs} / ${maxLogs}`;
      }
    }

    function exportLogs() {
      const content = logs.map((log) => `[${log.time}] [${log.level}] ${log.message}`).join('\n');
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `mcdevconsole-logs-${Date.now()}.txt`;
      link.click();
      URL.revokeObjectURL(url);
      addLog('INFO', '日志已导出到本地文件');
    }

    function getCommandTarget() {
      return document.querySelector('.composer__target-button.active')?.dataset.target || 'client';
    }

    function updateBridgeStatus() {
      const composerPanel = document.getElementById('composer-panel');
      const bridgeStatus = document.getElementById('bridge-status');
      const expanded = composerPanel.classList.contains('expanded');
      const target = getCommandTarget() === 'server' ? '服务端' : '客户端';

      bridgeStatus.textContent = expanded ? `${target} Python` : '已折叠';

      document.getElementById('runtime-hint').textContent = bridge.available
        ? '宿主已接管前端通信'
        : '当前运行于 Vite / 浏览器调试模式';
    }

    function highlightPython(code) {
      const escaped = escapeHtml(code);
      return escaped
        .replace(/(^|\n)(\s*#.*?)(?=\n|$)/g, '$1<span class="code-token-comment">$2</span>')
        .replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, '<span class="code-token-string">$1</span>')
        .replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="code-token-number">$1</span>')
        .replace(/\b(def|class|if|elif|else|for|while|return|import|from|as|try|except|finally|with|lambda|pass|break|continue|in|is|not|and|or|True|False|None)\b/g, '<span class="code-token-keyword">$1</span>')
        .replace(/\b(print|len|range|str|int|float|dict|list|set|tuple|open|type|isinstance|enumerate|json)\b/g, '<span class="code-token-builtin">$1</span>');
    }

    function syncCodeHighlight() {
      const input = document.getElementById('command-input');
      const highlight = document.getElementById('command-highlight');
      if (!input || !highlight) {
        return;
      }
      highlight.innerHTML = `${highlightPython(input.value)}\n`;
      highlight.scrollTop = input.scrollTop;
      highlight.scrollLeft = input.scrollLeft;
    }

    function updateMaximizeButton(isMaximized) {
      const btn = document.getElementById('titlebar-maximize');
      if (!btn) return;

      if (isMaximized) {
        btn.title = '还原';
        btn.innerHTML = `
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M5 3h8v8M3 5h8v8" fill="none" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        `;
      } else {
        btn.title = '最大化';
        btn.innerHTML = `
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <rect x="2" y="2" width="12" height="12" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        `;
      }
    }

    function handleHostMessage(message) {
      if (!message || typeof message !== 'object') {
        addLog('WARN', '收到无法识别的宿主消息');
        return;
      }

      switch (message.kind) {
        case 'log': {
          const targetSessionId = message.sessionId || activeDeviceId;
          if (!targetSessionId) {
            return;
          }

          if (!deviceMap.has(targetSessionId)) {
            ensureDevice({
              id: targetSessionId,
              name: message.name || targetSessionId,
              online: true,
              endpoint: message.endpoint || '未知端点',
              platform: message.platform || 'Unknown',
              lastSeen: message.time || new Date().toLocaleTimeString()
            });
            scheduleDeviceRender();
          }

          addLog(
            message.level || 'INFO',
            message.message || '',
            targetSessionId,
            message.time || ''
          );
          break;
        }
        case 'device.upsert': {
          const sessionId = message.sessionId || message.id;
          if (!sessionId) {
            break;
          }

          const device = ensureDevice({
            id: sessionId,
            name: message.name || sessionId,
            online: message.online ?? true,
            endpoint: message.endpoint || '未知端点',
            platform: message.platform || 'Unknown',
            lastSeen: message.time || new Date().toLocaleTimeString()
          });

          device.online = message.online ?? true;
          if (!activeDeviceId) {
            activeDeviceId = sessionId;
          }

          scheduleDeviceRender();
          scheduleLogRender();
          break;
        }
        case 'device.offline': {
          const sessionId = message.sessionId || message.id;
          const device = deviceMap.get(sessionId);
          if (device) {
            device.online = false;
            device.lastSeen = new Date().toLocaleTimeString();
            scheduleDeviceRender();
            scheduleLogRender();
          }
          break;
        }
        case 'window.state': {
          updateMaximizeButton(message.maximized === true);
          break;
        }
        case 'hello': {
          console.info('[MCDevConsole]', message.message || 'MCDevConsole Host Ready');
          break;
        }
        case 'host.echo': {
          console.info('[MCDevConsole]', message);
          break;
        }
        default: {
          console.info('[MCDevConsole] 未处理宿主消息', message);
          break;
        }
      }
    }

    function sendCommandToHost() {
      const text = document.getElementById('command-input').value.trim();
      const target = getCommandTarget();
      const device = getActiveDevice();

      if (!text) {
        addLog('WARN', '执行已取消：Python 代码为空');
        return;
      }

      const sessionId = device?.id || activeDeviceId;
      if (!sessionId) {
        addLog('WARN', '执行已取消：当前没有可用客户端会话');
        return;
      }

      const payload = {
        kind: 'exec.python',
        target,
        sessionId,
        code: text
      };

      const envelope = {
        kind: 'web.command',
        timestamp: Date.now(),
        payload
      };

      const delivered = bridge.post(envelope);
      addLog('INFO', delivered
        ? `已提交 ${target === 'server' ? '服务端' : '客户端'} Python 执行请求`
        : `浏览器模式模拟执行 ${target === 'server' ? '服务端' : '客户端'} Python 代码`);
    }

    function toggleComposerPanel() {
      const panel = document.getElementById('composer-panel');
      const logsPanel = document.getElementById('logs-panel');
      const isExpanding = !panel.classList.contains('expanded');
      
      panel.classList.toggle('expanded');
      
      // 折叠时清除拖拽设置的 flex 样式，恢复 CSS 默认值
      if (!isExpanding) {
        // 清除内联样式，恢复 CSS 中的默认 flex 值
        logsPanel.style.flex = '';
        panel.style.flex = '';
      }
      
      updateBridgeStatus();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function sendWindowCommand(command) {
      const message = {
        kind: 'window.command',
        command: command,
        timestamp: Date.now()
      };
      bridge.post(message);
    }

    function bootstrap() {
      applyTheme(localStorage.getItem(themeKey) || 'dark');

      renderDevices();
      renderLogs();
      updateBridgeStatus();

      document.getElementById('github-link').addEventListener('click', () => {
        const delivered = bridge.post({
          kind: 'external.open',
          url: 'https://github.com/GitHub-Zero123/MCDevConsole',
          timestamp: Date.now()
        });

        if (!delivered) {
          window.open('https://github.com/GitHub-Zero123/MCDevConsole', '_blank', 'noopener');
        }
      });
      document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
      document.getElementById('send-command').addEventListener('click', sendCommandToHost);
      document.getElementById('composer-toggle').addEventListener('click', toggleComposerPanel);

      document.getElementById('device-list').addEventListener('click', (event) => {
        const button = event.target.closest('[data-device-id]');
        if (!button) {
          return;
        }
        setActiveDevice(button.getAttribute('data-device-id'));
      });

      document.querySelectorAll('.composer__target-button').forEach((button) => {
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          document.querySelectorAll('.composer__target-button').forEach((item) => {
            item.classList.toggle('active', item === button);
          });
          updateBridgeStatus();
        });
      });

      const commandInput = document.getElementById('command-input');
      commandInput.addEventListener('input', syncCodeHighlight);
      commandInput.addEventListener('scroll', syncCodeHighlight);
      syncCodeHighlight();

      // 标题栏窗口控制按钮
      document.getElementById('titlebar-minimize').addEventListener('click', () => {
        sendWindowCommand('minimize');
      });
      document.getElementById('titlebar-maximize').addEventListener('click', () => {
        sendWindowCommand('toggle-maximize');
      });
      document.getElementById('titlebar-close').addEventListener('click', () => {
        sendWindowCommand('close');
      });

      // 标题栏拖拽 / 双击最大化还原
      const titlebar = document.getElementById('titlebar');
      let titlebarDragTimer = null;
      titlebar.addEventListener('mousedown', (e) => {
        const titlebarActions = document.querySelector('.titlebar__actions');
        const isInButtonArea = titlebarActions && titlebarActions.contains(e.target);

        if (!isInButtonArea) {
          titlebarDragTimer = window.setTimeout(() => {
            sendWindowCommand('drag-start');
            titlebarDragTimer = null;
          }, 50);
        }
      });
      titlebar.addEventListener('mouseup', () => {
        if (titlebarDragTimer !== null) {
          clearTimeout(titlebarDragTimer);
          titlebarDragTimer = null;
        }
      });
      titlebar.addEventListener('mouseleave', () => {
        if (titlebarDragTimer !== null) {
          clearTimeout(titlebarDragTimer);
          titlebarDragTimer = null;
        }
      });
      titlebar.addEventListener('dblclick', (e) => {
        const titlebarActions = document.querySelector('.titlebar__actions');
        const isInButtonArea = titlebarActions && titlebarActions.contains(e.target);

        if (titlebarDragTimer !== null) {
          clearTimeout(titlebarDragTimer);
          titlebarDragTimer = null;
        }

        if (!isInButtonArea) {
          sendWindowCommand('toggle-maximize');
        }
      });

      if (bridge.available) {
        window.chrome.webview.addEventListener('message', (event) => {
          handleHostMessage(event.data);
        });

        bridge.post({
          kind: 'web.ready',
          timestamp: Date.now(),
          message: 'frontend bootstrapped'
        });
      }
    }

    bootstrap();
  </script>
</body>
</html>
